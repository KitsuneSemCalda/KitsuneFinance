services:
  web:
    build: .
    image: kitsune_finance:latest
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - DATABASE_URL=sqlite3:///rails/storage/production.sqlite3
    volumes:
      - kitsune_storage:/rails/storage
    restart: unless-stopped

volumes:
  kitsune_storage:
